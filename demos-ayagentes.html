<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Demo Agentes IA — AYAgentes™</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/retell-client-js-sdk@latest/dist/index.umd.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#080909;
  --surface:#0f1011;
  --border:rgba(255,255,255,0.08);
  --lime:#e8ff47;
  --lime-dim:rgba(232,255,71,0.12);
  --text:#eceae2;
  --muted:rgba(236,234,226,0.45);
  --mono:'DM Mono',monospace;
  --sans:'DM Sans',sans-serif;
  --display:'Syne',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;
  background-image:radial-gradient(circle at 1px 1px,rgba(255,255,255,0.025) 1px,transparent 0);
  background-size:28px 28px;
}

/* NAV */
nav{display:flex;align-items:center;justify-content:space-between;padding:1.25rem 2rem;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;background:rgba(8,9,9,0.92);backdrop-filter:blur(12px)}
.logo{font-family:var(--display);font-weight:800;font-size:18px;letter-spacing:-0.02em}
.logo span{color:var(--lime)}
.nav-badge{font-family:var(--mono);font-size:10px;color:var(--lime);border:1px solid rgba(232,255,71,0.3);padding:4px 10px;border-radius:20px;letter-spacing:0.1em}

/* HERO */
.hero{text-align:center;padding:4rem 2rem 3rem;max-width:800px;margin:0 auto}
.hero-tag{font-family:var(--mono);font-size:10px;color:var(--lime);letter-spacing:0.25em;text-transform:uppercase;display:inline-flex;align-items:center;gap:6px;margin-bottom:1.5rem}
.hero-tag::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--lime);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
h1{font-family:var(--display);font-size:clamp(32px,5vw,56px);font-weight:900;line-height:1;letter-spacing:-0.03em;margin-bottom:1rem}
h1 em{font-style:normal;color:var(--lime)}
.hero-sub{color:var(--muted);font-size:16px;max-width:500px;margin:0 auto 2rem;line-height:1.6}
.tabs-nav{display:inline-flex;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:4px}
.tab-btn{font-family:var(--mono);font-size:11px;letter-spacing:0.1em;padding:8px 20px;border-radius:8px;border:none;cursor:pointer;transition:all 0.2s;color:var(--muted);background:transparent;text-transform:uppercase}
.tab-btn.active{background:var(--lime);color:#080909;font-weight:600}

/* GRID */
.agents-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:1rem;padding:2rem;max-width:1200px;margin:0 auto}

/* CARD */
.agent-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;transition:border-color 0.2s,transform 0.2s;position:relative}
.agent-card:hover{border-color:rgba(232,255,71,0.25);transform:translateY(-2px)}
.card-header{padding:1.25rem 1.25rem 1rem;display:flex;align-items:flex-start;gap:12px}
.card-emoji{font-size:28px;width:48px;height:48px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.04);border-radius:10px;flex-shrink:0}
.card-meta{flex:1}
.agent-name{font-family:var(--display);font-size:20px;font-weight:800;line-height:1}
.agent-brand{font-family:var(--mono);font-size:9px;letter-spacing:0.2em;text-transform:uppercase;margin:3px 0 4px}
.agent-industry{font-size:12px;color:var(--muted)}
.card-desc{padding:0 1.25rem 1.25rem;font-size:13px;color:var(--muted);line-height:1.6}
.card-actions{padding:0 1.25rem 1.25rem;display:flex;gap:8px}

/* BUTTONS */
.btn-voice{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:11px 16px;border-radius:10px;border:none;cursor:pointer;font-family:var(--display);font-size:13px;font-weight:700;transition:all 0.2s}
.btn-voice.idle{background:var(--lime);color:#080909}
.btn-voice.idle:hover{opacity:0.9;transform:scale(1.02)}
.btn-voice.active{background:#ff4757;color:#fff;animation:ring 1.5s infinite}
@keyframes ring{0%,100%{box-shadow:0 0 0 0 rgba(255,71,87,0.4)}50%{box-shadow:0 0 0 8px rgba(255,71,87,0)}}
.btn-chat{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:11px 16px;border-radius:10px;border:1px solid var(--border);cursor:pointer;font-family:var(--display);font-size:13px;font-weight:700;background:transparent;color:var(--text);transition:all 0.2s}
.btn-chat:hover{border-color:rgba(232,255,71,0.4);background:var(--lime-dim)}

/* STATUS */
.voice-status{margin:0 1.25rem 1rem;font-family:var(--mono);font-size:10px;color:var(--lime);letter-spacing:0.1em;display:none;align-items:center;gap:6px}
.voice-status.show{display:flex}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--lime);animation:pulse 1s infinite}

/* CHAT MODAL */
.chat-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;display:none;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(4px)}
.chat-overlay.open{display:flex}
.chat-modal{background:var(--surface);border:1px solid var(--border);border-radius:20px;width:100%;max-width:460px;height:580px;display:flex;flex-direction:column;overflow:hidden}
.chat-header{padding:1rem 1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.chat-agent-info{display:flex;align-items:center;gap:10px}
.chat-emoji{font-size:22px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.04);border-radius:8px}
.chat-name{font-family:var(--display);font-size:15px;font-weight:800}
.chat-brand{font-family:var(--mono);font-size:9px;letter-spacing:0.15em;color:var(--muted);text-transform:uppercase}
.chat-close{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all 0.2s}
.chat-close:hover{background:rgba(255,255,255,0.06);color:var(--text)}
.chat-messages{flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:10px}
.chat-messages::-webkit-scrollbar{width:4px}
.chat-messages::-webkit-scrollbar-track{background:transparent}
.chat-messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.msg{max-width:85%;padding:10px 14px;border-radius:14px;font-size:14px;line-height:1.5;animation:msgIn 0.2s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg.agent{background:rgba(255,255,255,0.06);border:1px solid var(--border);align-self:flex-start;border-radius:4px 14px 14px 14px}
.msg.user{background:var(--lime);color:#080909;align-self:flex-end;border-radius:14px 14px 4px 14px;font-weight:500}
.msg.typing{background:rgba(255,255,255,0.06);border:1px solid var(--border);align-self:flex-start;border-radius:4px 14px 14px 14px;padding:12px 16px}
.typing-dots{display:flex;gap:4px}
.typing-dots span{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:dot 1.2s infinite}
.typing-dots span:nth-child(2){animation-delay:0.2s}
.typing-dots span:nth-child(3){animation-delay:0.4s}
@keyframes dot{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
.chat-input-area{padding:1rem;border-top:1px solid var(--border);display:flex;gap:8px}
.chat-input{flex:1;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-family:var(--sans);font-size:14px;outline:none;transition:border-color 0.2s}
.chat-input:focus{border-color:rgba(232,255,71,0.4)}
.chat-input::placeholder{color:var(--muted)}
.chat-send{width:40px;height:40px;border-radius:10px;background:var(--lime);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:opacity 0.2s;flex-shrink:0}
.chat-send:hover{opacity:0.85}
.chat-send svg{width:16px;height:16px;fill:#080909}

/* FOOTER */
footer{text-align:center;padding:2rem;border-top:1px solid var(--border);margin-top:2rem}
footer p{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:0.1em}
footer strong{color:var(--lime)}

/* VOICE TAB HIDDEN */
.voice-section,.chat-section{display:none}
.voice-section.active,.chat-section.active{display:block}

@media(max-width:600px){
  nav{padding:1rem}
  .hero{padding:2.5rem 1rem 2rem}
  .agents-grid{padding:1rem;grid-template-columns:1fr}
}
</style>
</head>
<body>

<nav>
  <div class="logo">AYAgentes<span>™</span></div>
  <div class="nav-badge">● DEMOS EN VIVO</div>
</nav>

<div class="hero">
  <div class="hero-tag">Prueba ahora mismo</div>
  <h1>6 agentes IA.<br/><em>Una demo real.</em></h1>
  <p class="hero-sub">Elige una industria y habla con el agente — voz o texto. Así es exactamente como trabaja en tu negocio.</p>
  <div class="tabs-nav">
    <button class="tab-btn active" onclick="switchTab('voice')">🎙️ Agentes de voz</button>
    <button class="tab-btn" onclick="switchTab('chat')">💬 Agentes de texto</button>
  </div>
</div>

<!-- VOICE SECTION -->
<div class="voice-section active" id="voice-section">
  <div class="agents-grid" id="voice-grid"></div>
</div>

<!-- CHAT SECTION -->
<div class="chat-section" id="chat-section">
  <div class="agents-grid" id="chat-grid"></div>
</div>

<!-- CHAT MODAL -->
<div class="chat-overlay" id="chatOverlay" onclick="closeChatIfOutside(event)">
  <div class="chat-modal" id="chatModal">
    <div class="chat-header">
      <div class="chat-agent-info">
        <div class="chat-emoji" id="modalEmoji"></div>
        <div>
          <div class="chat-name" id="modalName"></div>
          <div class="chat-brand" id="modalBrand"></div>
        </div>
      </div>
      <button class="chat-close" onclick="closeChat()">✕</button>
    </div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-area">
      <input class="chat-input" id="chatInput" placeholder="Escribe tu mensaje..." onkeydown="handleKey(event)"/>
      <button class="chat-send" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
      </button>
    </div>
  </div>
</div>

<footer>
  <p>Powered by <strong>AYAgentes™</strong> · by AYAlgoritmo · <strong>ayagentes.app</strong></p>
</footer>

<script>
const AGENTS = [
  {
    id:'sofia',
    name:'Sofía',
    brand:'DENTALIKA',
    industry:'Clínica dental',
    emoji:'🦷',
    color:'#e8ff47',
    retellId:'agent_04f4d124276b2725238c66ba16',
    prompt:`Eres Sofía, asistente virtual de Dentalika, una clínica dental moderna en Quito. Eres cálida, profesional y empática. Respondes en español latinoamericano neutro. Tu objetivo es agendar citas, responder dudas sobre tratamientos y calificar pacientes. Respuestas cortas (máximo 2-3 oraciones). Siempre termina con una pregunta o invitación a agendar. Si no sabes algo específico di que te comuniques con la clínica directamente.`
  },
  {
    id:'andres',
    name:'Andrés',
    brand:'IZIHOME',
    industry:'Casas modulares',
    emoji:'🏗️',
    color:'#47c8ff',
    retellId:'agent_c0251d63e1a5356752b71e6e8d',
    prompt:`Eres Andrés, asesor virtual de IziHome, empresa de casas modulares Steel Frame en Ecuador. Eres técnico pero accesible, apasionado por la construcción moderna. Respondes en español latinoamericano neutro. Tu objetivo es consultar modelos, precios y tiempos de entrega, y calificar leads para el equipo de ventas. Respuestas cortas (máximo 2-3 oraciones). Siempre termina con una pregunta o invitación a cotizar.`
  },
  {
    id:'valeria',
    name:'Valeria',
    brand:'BAALBEK',
    industry:'Restaurante libanés',
    emoji:'🍽️',
    color:'#ff6b47',
    retellId:'agent_37d7ce6b4d415b898b264af234',
    prompt:`Eres Valeria, asistente virtual de Restaurant Baalbek, el restaurante libanés más tradicional de Quito con 28 años de historia. Ubicado en Av. 6 de Diciembre N23-103 y Wilson. Eres cálida, apasionada por la gastronomía libanesa. Respondes en español latinoamericano neutro. Tu objetivo es que el cliente haga una reserva o realice un pedido a domicilio. Nunca leas listas — describe los platos de forma apetitosa. Respuestas cortas. Siempre termina con una pregunta o invitación a reservar.`
  },
  {
    id:'carlos',
    name:'Carlos',
    brand:'NU HOUSE',
    industry:'Hotel boutique',
    emoji:'🏨',
    color:'#a047ff',
    retellId:'agent_623b412fed6a23eaa77391a10b',
    prompt:`Eres Carlos, asistente virtual de Nu House, hotel boutique en Quito. Eres sofisticado, amable y eficiente. Respondes en español latinoamericano neutro. Tu objetivo es informar disponibilidad, gestionar reservas y describir los servicios del hotel. Respuestas cortas (máximo 2-3 oraciones). Siempre termina con una pregunta o invitación a reservar.`
  },
  {
    id:'valentina',
    name:'Valentina',
    brand:'COLINEAL',
    industry:'Muebles & hogar',
    emoji:'🛋️',
    color:'#60f0a0',
    retellId:'agent_cc7e82d0c19ef62fccc8929817',
    prompt:`Eres Valentina, asistente virtual de Colineal, la empresa líder de muebles y hogar en Ecuador. Eres elegante, detallista y conocedora del diseño de interiores. Respondes en español latinoamericano neutro. Tu objetivo es asesorar en salas, comedores y dormitorios, informar sobre financiamiento hasta 30 meses y agendar visitas a la tienda. Respuestas cortas. Siempre termina con una pregunta o invitación a visitar la tienda.`
  },
  {
    id:'lucia',
    name:'Lucía',
    brand:'AYALGORITMO',
    industry:'Agentes IA para PyMEs',
    emoji:'🤖',
    color:'#e8ff47',
    retellId:'agent_ce1f215d4c0d96b6ce1b9aa897',
    prompt:`Eres Lucía, asistente virtual de AYAlgoritmo, empresa especializada en agentes de inteligencia artificial para PyMEs en Ecuador y LATAM. Eres tecnológica, directa y apasionada por la automatización. Respondes en español latinoamericano neutro. Tu objetivo es explicar cómo funcionan los agentes IA, resolver dudas y agendar demos. Respuestas cortas (máximo 2-3 oraciones). Siempre termina con una pregunta o invitación a agendar una demo gratuita.`
  }
];

// State
let activeRetellCall = null;
let activeAgentId = null;
let currentChatAgent = null;
let chatHistory = [];

// Build voice cards
const voiceGrid = document.getElementById('voice-grid');
AGENTS.forEach(agent => {
  voiceGrid.innerHTML += `
  <div class="agent-card" id="card-${agent.id}">
    <div class="card-header">
      <div class="card-emoji">${agent.emoji}</div>
      <div class="card-meta">
        <div class="agent-name">${agent.name}</div>
        <div class="agent-brand" style="color:${agent.color}">${agent.brand}</div>
        <div class="agent-industry">${agent.industry}</div>
      </div>
    </div>
    <div class="card-desc">Habla directamente con ${agent.name} — responde en tiempo real como si fuera un empleado de ${agent.brand}.</div>
    <div class="voice-status" id="status-${agent.id}">
      <span class="status-dot"></span>
      <span>Conectado · Habla ahora</span>
    </div>
    <div class="card-actions">
      <button class="btn-voice idle" id="btn-${agent.id}" onclick="toggleVoice('${agent.id}')">
        🎙️ Llamar a ${agent.name}
      </button>
    </div>
  </div>`;
});

// Build chat cards
const chatGrid = document.getElementById('chat-grid');
AGENTS.forEach(agent => {
  chatGrid.innerHTML += `
  <div class="agent-card">
    <div class="card-header">
      <div class="card-emoji">${agent.emoji}</div>
      <div class="card-meta">
        <div class="agent-name">${agent.name}</div>
        <div class="agent-brand" style="color:${agent.color}">${agent.brand}</div>
        <div class="agent-industry">${agent.industry}</div>
      </div>
    </div>
    <div class="card-desc">Chatea con ${agent.name} — responde como el agente real de ${agent.brand}, entrenado para su industria.</div>
    <div class="card-actions">
      <button class="btn-chat" onclick="openChat('${agent.id}')">
        💬 Chatear con ${agent.name}
      </button>
    </div>
  </div>`;
});

// Tab switch
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', (i===0&&tab==='voice')||(i===1&&tab==='chat')));
  document.getElementById('voice-section').classList.toggle('active', tab==='voice');
  document.getElementById('chat-section').classList.toggle('active', tab==='chat');
}

// Voice
async function toggleVoice(agentId) {
  const agent = AGENTS.find(a => a.id === agentId);
  const btn = document.getElementById(`btn-${agentId}`);
  const status = document.getElementById(`status-${agentId}`);

  if (activeRetellCall && activeAgentId === agentId) {
    activeRetellCall.stopCall();
    activeRetellCall = null;
    activeAgentId = null;
    btn.className = 'btn-voice idle';
    btn.innerHTML = `🎙️ Llamar a ${agent.name}`;
    status.classList.remove('show');
    return;
  }

  if (activeRetellCall) {
    activeRetellCall.stopCall();
    const oldBtn = document.getElementById(`btn-${activeAgentId}`);
    const oldAgent = AGENTS.find(a => a.id === activeAgentId);
    if (oldBtn) { oldBtn.className='btn-voice idle'; oldBtn.innerHTML=`🎙️ Llamar a ${oldAgent.name}`; }
    document.getElementById(`status-${activeAgentId}`)?.classList.remove('show');
  }

  btn.innerHTML = '⏳ Conectando...';
  btn.disabled = true;

  try {
    const retellClient = new RetellWebClient();
    const res = await fetch('https://api.retellai.com/v2/create-web-call', {
      method:'POST',
      headers:{'Authorization':'Bearer key_4b454fe4bc7f4e3abc2d6ed7083b','Content-Type':'application/json'},
      body: JSON.stringify({agent_id: agent.retellId})
    });
    const data = await res.json();

    await retellClient.startCall({accessToken: data.access_token});

    retellClient.on('call_ended', () => {
      btn.className = 'btn-voice idle';
      btn.innerHTML = `🎙️ Llamar a ${agent.name}`;
      btn.disabled = false;
      status.classList.remove('show');
      activeRetellCall = null;
      activeAgentId = null;
    });

    activeRetellCall = retellClient;
    activeAgentId = agentId;
    btn.className = 'btn-voice active';
    btn.innerHTML = `⏹ Finalizar llamada`;
    btn.disabled = false;
    status.classList.add('show');
  } catch(e) {
    btn.className = 'btn-voice idle';
    btn.innerHTML = `🎙️ Llamar a ${agent.name}`;
    btn.disabled = false;
    console.error(e);
  }
}

// Chat
function openChat(agentId) {
  currentChatAgent = AGENTS.find(a => a.id === agentId);
  chatHistory = [{role:'system', content: currentChatAgent.prompt}];
  document.getElementById('modalEmoji').textContent = currentChatAgent.emoji;
  document.getElementById('modalName').textContent = currentChatAgent.name;
  document.getElementById('modalBrand').textContent = currentChatAgent.brand;
  const msgs = document.getElementById('chatMessages');
  msgs.innerHTML = '';
  document.getElementById('chatOverlay').classList.add('open');
  document.getElementById('chatInput').focus();
  // Welcome message
  const welcome = getWelcome(agentId);
  appendMsg(welcome, 'agent');
  chatHistory.push({role:'assistant', content: welcome});
}

function getWelcome(id) {
  const w = {
    sofia:'¡Hola! Soy Sofía de Dentalika 🦷 ¿En qué te puedo ayudar hoy? ¿Buscas información sobre algún tratamiento o quieres agendar una cita?',
    andres:'¡Hola! Soy Andrés de IziHome 🏗️ ¿Estás pensando en construir o adquirir una casa modular? Con gusto te asesoro.',
    valeria:'¡Hola! Bienvenido a Restaurant Baalbek, soy Valeria 🍽️ ¿Deseas hacer una reserva o tienes alguna pregunta sobre nuestro menú?',
    carlos:'¡Bienvenido a Nu House! Soy Carlos 🏨 ¿Estás buscando disponibilidad para alguna fecha o quieres conocer nuestros servicios?',
    valentina:'¡Hola! Soy Valentina de Colineal 🛋️ ¿Te puedo ayudar a encontrar el mueble perfecto para tu hogar?',
    lucia:'¡Hola! Soy Lucía de AYAlgoritmo 🤖 ¿Te interesa automatizar la atención de tu negocio con IA? Con gusto te cuento cómo funciona.'
  };
  return w[id] || '¡Hola! ¿En qué te puedo ayudar?';
}

function closeChat() {
  document.getElementById('chatOverlay').classList.remove('open');
  currentChatAgent = null;
  chatHistory = [];
}

function closeChatIfOutside(e) {
  if (e.target.id === 'chatOverlay') closeChat();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function appendMsg(text, role) {
  const msgs = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = 'msg typing';
  div.id = 'typing-indicator';
  div.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  document.getElementById('typing-indicator')?.remove();
}

async function sendMessage() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text || !currentChatAgent) return;
  input.value = '';
  appendMsg(text, 'user');
  chatHistory.push({role:'user', content: text});
  showTyping();

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        system: currentChatAgent.prompt,
        messages: chatHistory.filter(m => m.role !== 'system').slice(-10)
      })
    });
    const data = await res.json();
    removeTyping();
    const reply = data.content?.[0]?.text || 'Lo siento, hubo un problema. Intenta de nuevo.';
    appendMsg(reply, 'agent');
    chatHistory.push({role:'assistant', content: reply});
  } catch(e) {
    removeTyping();
    appendMsg('Lo siento, hubo un problema de conexión. Intenta de nuevo.', 'agent');
  }
}
</script>
</body>
